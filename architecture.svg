<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .surface { fill: #f6f8fa; }
        .border { stroke: #d0d7de; }
        .text { fill: #1f2328; }
        .text-muted { fill: #656d76; }
        .text-bright { fill: #0d1117; }
        .blue { fill: #0969da; stroke: #0969da; }
        .green { fill: #1a7f37; stroke: #1a7f37; }
        .purple { fill: #8250df; stroke: #8250df; }
        .orange { fill: #9a6700; stroke: #9a6700; }
        .cyan { fill: #0891b2; stroke: #0891b2; }
        .l2-bg { fill: #8250df08; stroke: #8250df44; }
        .l1-bg { fill: #0969da08; stroke: #0969da44; }
        .l0-bg { fill: #9a670008; stroke: #9a670044; }
        .box-bg { fill: #f6f8fa; stroke: #d0d7de; }
        .footer-bg { fill: #f6f8fa; stroke: #d0d7de; }
        .step-orange-bg { fill: #9a670018; stroke: #9a670044; }
        .step-cyan-bg { fill: #0891b218; stroke: #0891b244; }
        .step-green-bg { fill: #1a7f3718; stroke: #1a7f3744; }
        .step-blue-bg { fill: #0969da18; stroke: #0969da44; }
        .arrow-line { stroke: #656d76; }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .surface { fill: #161b22; }
        .border { stroke: #30363d; }
        .text { fill: #c9d1d9; }
        .text-muted { fill: #8b949e; }
        .text-bright { fill: #f0f6fc; }
        .blue { fill: #58a6ff; stroke: #58a6ff; }
        .green { fill: #3fb950; stroke: #3fb950; }
        .purple { fill: #bc8cff; stroke: #bc8cff; }
        .orange { fill: #d29922; stroke: #d29922; }
        .cyan { fill: #39d2c0; stroke: #39d2c0; }
        .l2-bg { fill: #bc8cff08; stroke: #bc8cff44; }
        .l1-bg { fill: #58a6ff08; stroke: #58a6ff44; }
        .l0-bg { fill: #d2992208; stroke: #d2992244; }
        .box-bg { fill: #161b22; stroke: #30363d; }
        .footer-bg { fill: #161b22; stroke: #30363d; }
        .step-orange-bg { fill: #d2992218; stroke: #d2992244; }
        .step-cyan-bg { fill: #39d2c018; stroke: #39d2c044; }
        .step-green-bg { fill: #3fb95018; stroke: #3fb95044; }
        .step-blue-bg { fill: #58a6ff18; stroke: #58a6ff44; }
        .arrow-line { stroke: #8b949e; }
      }
      /* Default to dark */
      .bg { fill: #0d1117; }
      .surface { fill: #161b22; }
      .border { stroke: #30363d; }
      .text { fill: #c9d1d9; }
      .text-muted { fill: #8b949e; }
      .text-bright { fill: #f0f6fc; }
      .blue { fill: #58a6ff; stroke: #58a6ff; }
      .green { fill: #3fb950; stroke: #3fb950; }
      .purple { fill: #bc8cff; stroke: #bc8cff; }
      .orange { fill: #d29922; stroke: #d29922; }
      .cyan { fill: #39d2c0; stroke: #39d2c0; }
      .l2-bg { fill: #bc8cff08; stroke: #bc8cff44; }
      .l1-bg { fill: #58a6ff08; stroke: #58a6ff44; }
      .l0-bg { fill: #d2992208; stroke: #d2992244; }
      .box-bg { fill: #161b22; stroke: #30363d; }
      .footer-bg { fill: #161b22; stroke: #30363d; }
      .step-orange-bg { fill: #d2992218; stroke: #d2992244; }
      .step-cyan-bg { fill: #39d2c018; stroke: #39d2c044; }
      .step-green-bg { fill: #3fb95018; stroke: #3fb95044; }
      .step-blue-bg { fill: #58a6ff18; stroke: #58a6ff44; }
      .arrow-line { stroke: #8b949e; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" rx="12" class="bg"/>
  <rect x="0.5" y="0.5" width="819" height="519" rx="12" fill="none" class="border"/>

  <!-- Header -->
  <text x="32" y="44" font-size="20" font-weight="700" class="text-bright">LLM Wiki Agent</text>
  <text x="32" y="64" font-size="13" class="text-muted">Drop a file. Ask a question. The wiki builds itself.</text>

  <!-- L2: Behavior -->
  <rect x="24" y="84" width="772" height="64" rx="8" class="l2-bg"/>
  <rect x="36" y="96" width="24" height="16" rx="8" fill="none" class="purple" stroke-width="1"/>
  <text x="41" y="108" font-size="10" font-weight="600" class="purple">L2</text>
  <text x="68" y="108" font-size="14" font-weight="600" class="text-bright">Behavior</text>
  <text x="148" y="108" font-size="12" class="text-muted">— wiki-schema.md</text>
  <text x="36" y="130" font-size="12" class="text-muted">Domain-specific compilation rules. Page types, thresholds, frontmatter.</text>
  <text x="520" y="130" font-size="12" font-weight="600" class="purple">The only file you customize per project.</text>

  <!-- L1: Knowledge -->
  <rect x="24" y="160" width="772" height="186" rx="8" class="l1-bg"/>
  <rect x="36" y="172" width="24" height="16" rx="8" fill="none" class="blue" stroke-width="1"/>
  <text x="41" y="184" font-size="10" font-weight="600" class="blue">L1</text>
  <text x="68" y="184" font-size="14" font-weight="600" class="text-bright">Knowledge</text>
  <text x="158" y="184" font-size="12" class="text-muted">— the compiled wiki</text>

  <!-- Pipeline: raw/ -> .extracted/ -> wiki/ -> answer -->
  <rect x="80" y="200" width="100" height="30" rx="6" class="step-orange-bg"/>
  <text x="107" y="219" font-size="12" font-weight="600" text-anchor="middle" class="orange">raw/</text>
  <text x="130" y="244" font-size="10" class="text-muted" text-anchor="middle">PDF, MD, repos</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="215" x2="225" y2="215" stroke-width="1.5" class="arrow-line"/>
  <polyline points="220,211 228,215 220,219" fill="none" stroke-width="1.5" class="arrow-line"/>
  <text x="205" y="208" font-size="9" font-style="italic" text-anchor="middle" class="text-muted">extract</text>

  <rect x="233" y="200" width="110" height="30" rx="6" class="step-cyan-bg"/>
  <text x="288" y="219" font-size="12" font-weight="600" text-anchor="middle" class="cyan">.extracted/</text>
  <text x="288" y="244" font-size="10" class="text-muted" text-anchor="middle">clean markdown</text>

  <!-- Arrow 2 -->
  <line x1="348" y1="215" x2="388" y2="215" stroke-width="1.5" class="arrow-line"/>
  <polyline points="383,211 391,215 383,219" fill="none" stroke-width="1.5" class="arrow-line"/>
  <text x="368" y="208" font-size="9" font-style="italic" text-anchor="middle" class="text-muted">compile</text>

  <rect x="396" y="200" width="100" height="30" rx="6" class="step-green-bg"/>
  <text x="446" y="219" font-size="12" font-weight="600" text-anchor="middle" class="green">wiki/</text>
  <text x="446" y="244" font-size="10" class="text-muted" text-anchor="middle">structured pages</text>

  <!-- Arrow 3 -->
  <line x1="501" y1="215" x2="541" y2="215" stroke-width="1.5" class="arrow-line"/>
  <polyline points="536,211 544,215 536,219" fill="none" stroke-width="1.5" class="arrow-line"/>
  <text x="521" y="208" font-size="9" font-style="italic" text-anchor="middle" class="text-muted">query</text>

  <rect x="549" y="200" width="100" height="30" rx="6" class="step-blue-bg"/>
  <text x="599" y="219" font-size="12" font-weight="600" text-anchor="middle" class="blue">answer</text>
  <text x="599" y="244" font-size="10" class="text-muted" text-anchor="middle">from wiki + LLM</text>

  <!-- File-back arrow -->
  <path d="M599 235 L599 255 Q599 260 594 260 L456 260 Q451 260 451 255 L451 235" fill="none" stroke-width="1" stroke-dasharray="4,3" class="arrow-line"/>
  <polyline points="447,240 451,232 455,240" fill="none" stroke-width="1" class="arrow-line"/>
  <text x="525" y="272" font-size="9" font-style="italic" text-anchor="middle" class="text-muted">file back</text>

  <!-- Wiki boxes -->
  <rect x="44" y="284" width="176" height="48" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="44" y="284" width="3" height="48" rx="1.5" fill="none" class="green" stroke-width="0"/>
  <rect x="44" y="284" width="3" height="48" rx="0" class="green" fill="currentColor" opacity="0.8"/>
  <text x="56" y="302" font-size="12" font-weight="600" class="green">sources/</text>
  <text x="56" y="320" font-size="11" class="text-muted">One summary per raw file</text>

  <rect x="232" y="284" width="176" height="48" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="232" y="284" width="3" height="48" rx="0" class="green" fill="currentColor" opacity="0.8"/>
  <text x="244" y="302" font-size="12" font-weight="600" class="green">entities/</text>
  <text x="244" y="320" font-size="11" class="text-muted">People, orgs, tools</text>

  <rect x="420" y="284" width="176" height="48" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="420" y="284" width="3" height="48" rx="0" class="green" fill="currentColor" opacity="0.8"/>
  <text x="432" y="302" font-size="12" font-weight="600" class="green">concepts/</text>
  <text x="432" y="320" font-size="11" class="text-muted">Ideas, patterns</text>

  <rect x="608" y="284" width="176" height="48" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="608" y="284" width="3" height="48" rx="0" class="green" fill="currentColor" opacity="0.8"/>
  <text x="620" y="302" font-size="12" font-weight="600" class="green">comparisons/</text>
  <text x="620" y="320" font-size="11" class="text-muted">Cross-source analysis</text>

  <!-- L0: Infrastructure -->
  <rect x="24" y="358" width="772" height="104" rx="8" class="l0-bg"/>
  <rect x="36" y="370" width="24" height="16" rx="8" fill="none" class="orange" stroke-width="1"/>
  <text x="41" y="382" font-size="10" font-weight="600" class="orange">L0</text>
  <text x="68" y="382" font-size="14" font-weight="600" class="text-bright">Infrastructure</text>
  <text x="180" y="382" font-size="12" class="text-muted">— hooks + tools + git</text>

  <!-- Infra boxes -->
  <rect x="44" y="396" width="236" height="54" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="44" y="396" width="3" height="54" rx="0" class="orange" fill="currentColor" opacity="0.8"/>
  <text x="56" y="414" font-size="12" font-weight="600" class="orange">Hooks</text>
  <text x="56" y="430" font-size="11" class="text-muted">SessionStart: orientation</text>
  <text x="56" y="444" font-size="11" class="text-muted">PromptSubmit: detect new files</text>

  <rect x="292" y="396" width="236" height="54" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="292" y="396" width="3" height="54" rx="0" class="orange" fill="currentColor" opacity="0.8"/>
  <text x="304" y="414" font-size="12" font-weight="600" class="orange">Extractors</text>
  <text x="304" y="430" font-size="11" class="text-muted">PDF: pymupdf4llm | Repos: repomix</text>
  <text x="304" y="444" font-size="11" class="text-muted">MD: passthrough | Extensible</text>

  <rect x="540" y="396" width="244" height="54" rx="6" class="box-bg" stroke-width="1"/>
  <rect x="540" y="396" width="3" height="54" rx="0" class="orange" fill="currentColor" opacity="0.8"/>
  <text x="552" y="414" font-size="12" font-weight="600" class="orange">State</text>
  <text x="552" y="430" font-size="11" class="text-muted">manifest.json: pipeline state</text>
  <text x="552" y="444" font-size="11" class="text-muted">HANDOFF.md: session | git: history</text>

  <!-- Footer -->
  <rect x="24" y="474" width="772" height="32" rx="8" class="footer-bg" stroke-width="1"/>
  <text x="200" y="494" font-size="12" class="text-muted" text-anchor="middle"><tspan font-weight="600" class="green">1.</tspan> Drop a file into raw/</text>
  <text x="410" y="494" font-size="12" class="text-muted" text-anchor="middle"><tspan font-weight="600" class="green">2.</tspan> Ask a question</text>
  <text x="610" y="494" font-size="12" font-style="italic" class="text-muted" text-anchor="middle">Everything else is automatic.</text>
</svg>
